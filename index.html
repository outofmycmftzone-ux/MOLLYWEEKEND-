<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Molly Weekend</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff00ff">

</head>


<body>


<div class="app">


<div class="intro-glow">

<h1 class="neon-title">
MOLLY WEEKEND
</h1>

<p class="tagline">
Can you feel it yet?
</p>

</div>




<div id="menu">


<p class="subtitle">
Choose your experience
</p>




<button class="deck blue" onclick="openDeck('tame')">

🔵 TAME

<span>
The Spark<br>
Conversation Starters
</span>

</button>




<button class="deck red" onclick="openDeck('desire')">

🔴 DESIRE

<span>
The Heat<br>
Light Foreplay
</span>

</button>




<button class="deck purple" onclick="openDeck('touch')">

🟣 TOUCH ME

<span>
The Connection<br>
Deep Intimacy
</span>

</button>




<button class="deck red" onclick="openDeck('slowburn')">

🔥 SLOW BURN

<span>
A Journey From Spark To Connection
</span>

</button>




<button class="deck blue" onclick="openDeck('random')">

✨ RANDOM WEEKEND

<span>
All Cards. Anything Can Happen
</span>

</button>


</div>






<div id="deckIntro" style="display:none;">


<h2 id="deckTitle"></h2>


<p id="deckDescription"></p>




<button class="draw" onclick="startGame()">

▶ START

</button>




<button class="back" onclick="goBack()">

BACK

</button>


</div>







<div id="game" style="display:none;">


<div class="card">


<h2 id="category"></h2>


<p id="action"></p>


<p id="remaining"></p>


</div>





<button class="draw" onclick="drawCard()">

🎴 DRAW CARD

</button>




<button class="back" onclick="goBack()">

BACK

</button>


</div>



</div>






<script src="Script.js"></script>


<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", function(){

navigator.serviceWorker.register("service-worker.js")

.then(function(){

console.log("Service worker active");

})

.catch(function(error){

console.log("Service worker failed", error);

});

});

}

</script>


</body>

</html>
